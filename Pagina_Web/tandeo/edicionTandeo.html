<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tandeo - Tandeo System</title>
    <link rel="stylesheet" href="edicionTandeo.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../firebase-config.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎯 Tandeo System</h2>
                <p id="userName">Cargando...</p>
            </div>
            
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="registroTandeo.html" class="nav-link">
                    <span class="icon">➕</span>
                    <span>Registrar Tandeo</span>
                </a>
                <a href="edicionTandeo.html" class="nav-link active">
                    <span class="icon">✏️</span>
                    <span>Editar Tandeo</span>
                </a>
                <a href="eliminacion.html" class="nav-link">
                    <span class="icon">🗑️</span>
                    <span>Eliminar Tandeo</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <span class="icon">🚪</span>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1>Editar Tandeo</h1>
                    <p>Seleccione un tandeo y modifique sus datos</p>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <span id="userEmail">usuario@email.com</span>
                </div>
            </header>

            <div class="content">
                <!-- Selector de tandeo -->
                <div class="selector-container">
                    <label for="tandeoSelect">Seleccionar Tandeo a editar:</label>
                    <select id="tandeoSelect" class="tandeo-select">
                        <option value="">-- Cargando tandeos... --</option>
                    </select>
                </div>

                <!-- Formulario de edición -->
                <div class="form-container" id="editFormContainer" style="display: none;">
                    <form id="editarTandeoForm">
                        <input type="hidden" id="tandeoId">
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="nombre">Nombre del Tandeo *</label>
                                <input type="text" id="nombre" required>
                            </div>

                            <div class="form-group">
                                <label for="fecha">Fecha *</label>
                                <input type="date" id="fecha" required>
                            </div>

                            <div class="form-group">
                                <label for="horaInicio">Hora de Inicio *</label>
                                <input type="time" id="horaInicio" required>
                            </div>

                            <div class="form-group">
                                <label for="horaFin">Hora de Fin *</label>
                                <input type="time" id="horaFin" required>
                            </div>

                            <div class="form-group">
                                <label for="ubicacion">Ubicación *</label>
                                <input type="text" id="ubicacion" required>
                            </div>

                            <div class="form-group">
                                <label for="estado">Estado *</label>
                                <select id="estado" required>
                                    <option value="activo">Activo</option>
                                    <option value="pendiente">Pendiente</option>
                                    <option value="cancelado">Cancelado</option>
                                </select>
                            </div>

                            <div class="form-group full-width">
                                <label for="descripcion">Descripción</label>
                                <textarea id="descripcion" rows="4"></textarea>
                            </div>

                            <div class="form-group full-width">
                                <label for="participantes">Participantes</label>
                                <input type="text" id="participantes">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="cancelarEdicion()">Cancelar</button>
                            <button type="submit" class="btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>

                <div id="successMessage" class="success-message" style="display: none;">
                    <div class="success-icon">✓</div>
                    <h3>¡Tandeo Actualizado!</h3>
                    <p>Los cambios han sido guardados exitosamente</p>
                </div>
            </div>
        </main>
    </div>

    <script src="edicionTandeo.js"></script>
</body>
</html>
