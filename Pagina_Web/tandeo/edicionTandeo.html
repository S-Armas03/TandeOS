<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tandeo</title>
    <link rel="stylesheet" href="edicionTandeo.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>💧 Tandeo System</h2>
                <p id="adminName">Cargando...</p>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">📊 Dashboard</a>
                <a href="registroTandeo.html" class="nav-link">➕ Registrar Tandeo</a>
                <a href="edicionTandeo.html" class="nav-link active">✏️ Editar Tandeo</a>
                <a href="eliminacion.html" class="nav-link">🗑️ Eliminar Tandeo</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1>Editar Tandeo</h1>
                    <p>Seleccione un tandeo y modifique sus datos</p>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div>
                        <div id="adminNameHeader" class="user-name">Cargando...</div>
                        <div id="adminEmail" class="user-email">admin@tandeos.com</div>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="selector-container">
                    <label for="tandeoSelect">Seleccionar Tandeo a editar:</label>
                    <select id="tandeoSelect" class="tandeo-select">
                        <option value="">-- Cargando tandeos... --</option>
                    </select>
                </div>

                <div class="form-container" id="editFormContainer" style="display: none;">
                    <form id="editarTandeoForm">
                        <input type="hidden" id="tandeoId">
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="zona">Zona de Tandeo *</label>
                                <input type="text" id="zona" required>
                            </div>

                            <div class="form-group">
                                <label for="ubicacion">Ubicación *</label>
                                <input type="text" id="ubicacion" required>
                            </div>

                            <div class="form-group">
                                <label for="fechaInicio">Fecha de Inicio *</label>
                                <input type="text" id="fechaInicio" required readonly style="background:#f5f5f5;">
                            </div>

                            <div class="form-group">
                                <label for="fechaFinal">Fecha de Finalización *</label>
                                <input type="text" id="fechaFinal" required readonly style="background:#f5f5f5;">
                            </div>

                            <div class="form-group">
                                <label for="estado">Estado *</label>
                                <select id="estado" required>
                                    <option value="Activo">Activo</option>
                                    <option value="Pasado">Completado</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="cancelarEdicion()">Cancelar</button>
                            <button type="submit" class="btn-primary">Guardar Cambios</button>
                        </div>
                                       </form>
                </div>

                <div id="successMessage" class="success-message" style="display: none;">
                    <div class="success-icon">✓</div>
                    <h3>¡Tandeo Actualizado!</h3>
                    <p>Los cambios han sido guardados exitosamente</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="edicionTandeo.js"></script>
</body>
</html>
