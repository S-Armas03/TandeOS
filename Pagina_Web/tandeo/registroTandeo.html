<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Tandeo</title>
    <link rel="stylesheet" href="registroTandeo.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>💧 Tandeo System</h2>
                <p id="userName">Cargando...</p>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">📊 Dashboard</a>
                <a href="registroTandeo.html" class="nav-link active">➕ Registrar Tandeo</a>
                <a href="edicionTandeo.html" class="nav-link">✏️ Editar Tandeo</a>
                <a href="eliminacion.html" class="nav-link">🗑️ Eliminar Tandeo</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Registrar Nuevo Tandeo</h1>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <span id="userEmail">admin@tandeos.com</span>
                </div>
            </header>

            <div class="content">
                <form id="registroTandeoForm">
                    <div class="form-group">
                        <label>Zona de Tandeo</label>
                        <input type="text" id="zona" required>
                    </div>
                    <div class="form-group">
                        <label>Ubicación</label>
                        <input type="text" id="ubicacion" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="datetime-local" id="fechaInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Final</label>
                        <input type="datetime-local" id="fechaFinal" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="estado">
                            <option value="Activo">Activo</option>
                            <option value="Pasado">Completado</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>
                    <button type="submit">Registrar</button>
                </form>
            </div>
        </main>
    </div>
    <script type="module" src="registroTandeo.js"></script>
</body>
</html>
